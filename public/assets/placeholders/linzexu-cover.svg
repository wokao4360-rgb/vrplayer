<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">林则徐纪念馆封面骨架图</title>
  <desc id="desc">基于手绘拓扑整理的林则徐纪念馆预上线骨架封面图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5f7fb"/>
      <stop offset="100%" stop-color="#dde6f3"/>
    </linearGradient>
    <linearGradient id="road" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#94a3b8" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g transform="translate(64 72)">
    <text x="0" y="0" fill="#0f172a" font-family="'Noto Sans SC', 'Microsoft YaHei', sans-serif" font-size="58" font-weight="700">林则徐纪念馆</text>
    <text x="0" y="56" fill="#334155" font-family="'Noto Sans SC', 'Microsoft YaHei', sans-serif" font-size="24">预上线骨架图 · nodes + paths</text>
  </g>
  <g transform="translate(230 170)" fill="none" stroke="url(#road)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <path d="M110 20H500"/>
    <path d="M305 20V180"/>
    <path d="M150 180H470"/>
    <path d="M305 180V360"/>
    <path d="M305 360V540"/>
    <path d="M110 540H500"/>
    <path d="M305 540V700"/>
  </g>
  <g transform="translate(230 170)" filter="url(#shadow)" font-family="'Noto Sans SC', 'Microsoft YaHei', sans-serif" text-anchor="middle">
    <g>
      <rect x="0" y="-20" width="220" height="82" rx="24" fill="#ffffff"/>
      <text x="110" y="32" fill="#0f172a" font-size="34" font-weight="700">西屋3</text>
    </g>
    <g>
      <rect x="390" y="-20" width="360" height="82" rx="24" fill="#ffffff"/>
      <text x="570" y="32" fill="#64748b" font-size="34" font-weight="700">东屋3（暂未扫描）</text>
    </g>
    <g>
      <rect x="40" y="140" width="220" height="82" rx="24" fill="#ffffff"/>
      <text x="150" y="192" fill="#0f172a" font-size="34" font-weight="700">西屋2</text>
    </g>
    <g>
      <rect x="370" y="140" width="220" height="82" rx="24" fill="#ffffff"/>
      <text x="480" y="192" fill="#0f172a" font-size="34" font-weight="700">东屋2</text>
    </g>
    <g>
      <rect x="20" y="300" width="300" height="86" rx="24" fill="#ffffff"/>
      <text x="170" y="354" fill="#0f172a" font-size="34" font-weight="700">北屋（西半）</text>
    </g>
    <g>
      <rect x="310" y="300" width="300" height="86" rx="24" fill="#ffffff"/>
      <text x="460" y="354" fill="#0f172a" font-size="34" font-weight="700">北屋（东半）</text>
    </g>
    <g>
      <rect x="190" y="462" width="230" height="86" rx="24" fill="#ffffff"/>
      <text x="305" y="516" fill="#0f172a" font-size="34" font-weight="700">连屋</text>
    </g>
    <g>
      <rect x="0" y="600" width="220" height="82" rx="24" fill="#ffffff"/>
      <text x="110" y="652" fill="#0f172a" font-size="34" font-weight="700">西屋1</text>
    </g>
    <g>
      <rect x="390" y="600" width="220" height="82" rx="24" fill="#ffffff"/>
      <text x="500" y="652" fill="#0f172a" font-size="34" font-weight="700">东屋1</text>
    </g>
    <g>
      <rect x="180" y="720" width="250" height="86" rx="24" fill="#ffffff"/>
      <text x="305" y="774" fill="#0f172a" font-size="34" font-weight="700">南门</text>
    </g>
  </g>
  <g transform="translate(230 170)" fill="#ef4444" stroke="#ffffff" stroke-width="10">
    <circle cx="305" cy="20" r="26"/>
    <circle cx="305" cy="360" r="26"/>
    <circle cx="305" cy="540" r="26"/>
  </g>
</svg>
