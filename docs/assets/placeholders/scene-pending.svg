<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">待补素材占位图</title>
  <desc id="desc">用于林则徐纪念馆预上线场景的通用缩略图占位资源。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1120"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0.75"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g fill="none" stroke="url(#line)" stroke-width="8" stroke-linecap="round">
    <path d="M220 180h1160"/>
    <path d="M800 180v560"/>
    <path d="M260 740h1080"/>
  </g>
  <g fill="#e5eefc" opacity="0.9">
    <circle cx="800" cy="180" r="18"/>
    <circle cx="800" cy="460" r="18"/>
    <circle cx="800" cy="740" r="18"/>
  </g>
  <g font-family="'Noto Sans SC', 'Microsoft YaHei', sans-serif" text-anchor="middle">
    <text x="800" y="360" fill="#f8fafc" font-size="84" font-weight="700">待补素材</text>
    <text x="800" y="440" fill="#93c5fd" font-size="30" font-weight="600">林则徐纪念馆预上线场景占位图</text>
    <text x="800" y="780" fill="#94a3b8" font-size="28">后续只替换图片与校准数据，不改场景 ID</text>
  </g>
</svg>
